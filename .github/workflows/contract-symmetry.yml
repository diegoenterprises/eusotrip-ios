name: Contract Symmetry

# Fails a PR when an iOS Codable In/Out struct and its server tRPC Zod input
# schema disagree on a scalar type — the §6 bug class (e.g. agreementId Int vs
# z.string(), 435 String agreementId, loadId String vs z.number()). Cross-repo:
# checks out this iOS repo + the server repo and runs Scripts/contract-symmetry.mjs.
#
# SETUP (one-time, by a repo admin): add a repository secret WEB_REPO_TOKEN — a
# fine-grained PAT (or classic, `repo` scope) with READ access to
# diegoenterprises/eusoronetechnologiesinc. Until it's set, this workflow
# SKIPS the gate with a warning (it never blocks PRs on a missing secret).

on:
  pull_request:
    paths:
      - "EusoTrip/**/*.swift"
      - "Scripts/contract-symmetry.mjs"
      - ".github/workflows/contract-symmetry.yml"
  push:
    branches: [main]
  workflow_dispatch: {}
  # Server-side drift: the server repo's contract-symmetry-notify.yml fires this
  # event (via repository_dispatch) whenever frontend/server/routers/** or the
  # drizzle schema changes, so a Zod-schema edit on the server is gated too — not
  # just iOS-side struct edits. repository_dispatch always runs the workflow as
  # defined on the DEFAULT branch, so this arm only goes live once this file is
  # on main. It still degrades gracefully if WEB_REPO_TOKEN is unset (skips).
  repository_dispatch:
    types: [server-contract-check]

permissions:
  contents: read

concurrency:
  group: contract-symmetry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-symmetry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout iOS repo
        uses: actions/checkout@v4
        with:
          path: ios

      - name: Detect server-repo token
        id: cfg
        env:
          WEB_TOKEN: ${{ secrets.WEB_REPO_TOKEN }}
        run: |
          if [ -z "$WEB_TOKEN" ]; then
            echo "::warning title=Contract Symmetry skipped::WEB_REPO_TOKEN not configured — add a PAT with read access to eusoronetechnologiesinc to enable the iOS↔server contract gate."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout server repo
        if: steps.cfg.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          repository: diegoenterprises/eusoronetechnologiesinc
          token: ${{ secrets.WEB_REPO_TOKEN }}
          path: web
          persist-credentials: false
          # On a server-originated run (repository_dispatch from the server repo's
          # notify workflow), check out the exact ref that changed — so the gate
          # tests the PR's/commit's server code, not stale main. For iOS-originated
          # runs this expression is empty, and checkout@v4 falls back to the
          # default branch (main), which is the intended behaviour.
          ref: ${{ github.event.client_payload.web_ref }}

      - name: Setup Node
        if: steps.cfg.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Contract-symmetry gate (fails on type mismatch)
        if: steps.cfg.outputs.ok == 'true'
        run: node ios/Scripts/contract-symmetry.mjs --ios=ios --web=web

      - name: id-field drift census (metric — never fails the build)
        if: steps.cfg.outputs.ok == 'true'
        run: |
          {
            echo '## id-field type-drift census'
            echo '```'
            node ios/Scripts/contract-symmetry.mjs --ios=ios --web=web --summary 2>&1 | sed -E 's/\x1b\[[0-9;]*m//g'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY" || true
