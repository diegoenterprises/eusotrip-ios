  <!-- ========== BOW AIR DISPLACEMENT ========== -->
  <ellipse class="bow-air" cx="180" cy="410" rx="38" ry="55" fill="url(#bowHaze)"/>
  <!-- ========== EXHAUST PUFFS ========== -->
  <g filter="url(#softBlur)" opacity="0.5">
    <circle cx="292" cy="200" r="6" fill="#C8CDD8">
      <animate attributeName="cy" from="200" to="120" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="r"  from="6" to="14" dur="2.6s" repeatCount="indefinite"/>
