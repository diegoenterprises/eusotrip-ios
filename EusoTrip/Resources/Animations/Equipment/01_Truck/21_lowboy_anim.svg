    </circle>
    <circle cx="294" cy="200" r="5" fill="#C8CDD8">
      <animate attributeName="cy" from="200" to="120" dur="2.6s" begin="-0.9s" repeatCount="indefinite"/>
      <animate attributeName="r"  from="5" to="12" dur="2.6s" begin="-0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.15;0.7;1" dur="2.6s" begin="-0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="290" cy="200" r="4" fill="#C8CDD8">
