<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"  width="1200" height="600" viewBox="0 50 1200 480" preserveAspectRatio="xMidYMid slice">
  <style><![CDATA[
    /* ========== CHASSIS BOB — the body floats on suspension ========== */
    .chassis-bob   { animation: chassis-bob 0.5s ease-in-out infinite; }
    @keyframes chassis-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-1.5px); }
    }
    .cab-sway      { animation: cab-sway 0.5s ease-in-out infinite -0.12s; }
    @keyframes cab-sway {
      0%, 100% { transform: translateY(0)    rotate(0deg); }
      50%      { transform: translateY(-0.8px) rotate(-0.15deg); }
    }
    .mudflap       { transform-origin: 1075px 440px;
                      animation: mudflap-flutter 0.42s ease-in-out infinite; }
    @keyframes mudflap-flutter {
      0%, 100% { transform: rotate(0deg)   translateX(0); }
      50%      { transform: rotate(-4deg)  translateX(0.4px); }
    }
    .streak        { animation: streak-drift 1.2s linear infinite; opacity: 0; }
    .streak.s2     { animation-delay: -0.4s; }
    .streak.s3     { animation-delay: -0.8s; }
    @keyframes streak-drift {
      0%   { transform: translateX(0);    opacity: 0; }
      15%  { opacity: 0.45; }
      85%  { opacity: 0.45; }
      100% { transform: translateX(180px); opacity: 0; }
    }
    .bow-air       { animation: bow-air-pulse 1.4s ease-in-out infinite;
                      transform-origin: 180px 410px; }
    @keyframes bow-air-pulse {
      0%, 100% { transform: scale(1)   translateX(0);   opacity: 0.18; }
      50%      { transform: scale(1.1) translateX(-3px); opacity: 0.32; }
    }
    .tire-dust     { animation: tire-dust 1.6s ease-out infinite; }
    @keyframes tire-dust {
      0%, 80%, 100% { opacity: 0; transform: translateX(0) scale(0.4); }
      8%, 18%       { opacity: 0.45; transform: translateX(0) scale(0.4); }
      35%           { opacity: 0;    transform: translateX(14px) scale(1); }
    }

    /* ========== ORIGINAL MOTION VOCAB ========== */
    .sheen        { animation: sheen-sweep 5s ease-in-out infinite;
                      transform-box: fill-box; }
    @keyframes sheen-sweep {
      0%   { transform: translateX(-220px); opacity: 0; }
      30%  { opacity: 0.5; }
      70%  { opacity: 0.5; }
      100% { transform: translateX(220px); opacity: 0; }
    }
    .wordmark     { animation: wordmark-breath 6s ease-in-out infinite; }
    @keyframes wordmark-breath {
      0%, 100% { opacity: 0.14; }
      50%      { opacity: 0.24; }
    }
    .badge-e      { transform-box: fill-box; transform-origin: center;
                      animation: badge-pulse 3.2s ease-in-out infinite; }
    @keyframes badge-pulse {
      0%, 100% { transform: scale(1);    opacity: 0.85; }
      50%      { transform: scale(1.06); opacity: 1; }
    }
    .headlight-glow { animation: headlight-pulse 4s ease-in-out infinite; }
    @keyframes headlight-pulse {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }
    .airlines     { animation: airlines-vibrate 0.55s ease-in-out infinite;
                      transform-box: fill-box; }
    @keyframes airlines-vibrate {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(0.6px); }
    }
    .chevron      { animation: chevron-pulse 2.2s ease-in-out infinite; }
    @keyframes chevron-pulse {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 0.65; }
    }
    .sky-shimmer  { animation: sky-drift 14s linear infinite;
                      transform-box: fill-box; }
    @keyframes sky-drift {
      from { transform: translateX(-40px); opacity: 0.12; }
      50%  { opacity: 0.22; }
      to   { transform: translateX(40px); opacity: 0.12; }
    }
    .ground-line  { stroke-dasharray: 14 9;
                      animation: ground-dash 1.6s linear infinite; }
    @keyframes ground-dash {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -46; }
    }
    /* ========== BRAND LOCKUP ========== */
    .brand-mark {
      transform-box: fill-box; transform-origin: center;
      animation: brand-pulse 3.6s ease-in-out infinite;
    }
    @keyframes brand-pulse {
      0%, 100% { transform: scale(1);    opacity: 0.92; }
      50%      { transform: scale(1.05); opacity: 1; }
    }
    .brand-word { animation: brand-word-breath 6s ease-in-out infinite; }
    @keyframes brand-word-breath {
      0%, 100% { opacity: 0.78; }
      50%      { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .chassis-bob, .cab-sway, .mudflap, .streak, .bow-air, .tire-dust,
      .sheen, .wordmark, .badge-e, .headlight-glow, .airlines, .chevron,
      .sky-shimmer, .ground-line, .brand-mark, .brand-word { animation: none !important; }
    }
  
    /* ========== DARK-MODE OVERRIDES (2026-05-16) ========== */
    @media (prefers-color-scheme: dark) {
      .sky-bg          { fill: url(#skyDark) !important; }
      .ground-line     { stroke: #5E4FC6 !important; opacity: 0.55 !important; }
      .ground-shadow   { fill: #060912 !important; opacity: 0.55 !important; }
      .brand-word      { fill: #C9B6FF !important; }
      .brand-tagline   { fill: #8B7FE3 !important; }
      .equipment-label { fill: #C9B6FF !important; }
      .equipment-sub   { fill: #8B7FE3 !important; }
      .equipment-rule  { stroke: #6E4DFF !important; }
    }
  ]]></style>

  <!-- 21 · Lowboy · Idle silhouette · TRUCK / LBS
       Empty heavy-haul lowboy trailer (3-section: gooseneck + drop deck + tail).
       Distinct from #12 Oversized because no cargo loaded — just the empty trailer. -->
  <defs>
        <linearGradient id="skyDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0A0F1F"/>
      <stop offset="55%" stop-color="#141A2E"/>
      <stop offset="100%" stop-color="#0B0F1B"/>
    </linearGradient>
    <linearGradient id="brandIridescent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1473FF"/>
      <stop offset="50%" stop-color="#6E4DFF"/>
      <stop offset="100%" stop-color="#BE01FF"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EEF1FA"/><stop offset="55%" stop-color="#F5EEFC"/><stop offset="100%" stop-color="#EFF8FA"/></linearGradient>
    <linearGradient id="cab" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2B85FF"/><stop offset="55%" stop-color="#6E4DFF"/><stop offset="100%" stop-color="#A726E8"/></linearGradient>
    <linearGradient id="cabRoof" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></linearGradient>
    <linearGradient id="windowGlass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#BFD3FF"/><stop offset="100%" stop-color="#7E9DDB"/></linearGradient>
    <linearGradient id="deckTop" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6A707A"/><stop offset="50%" stop-color="#4A4F58"/><stop offset="100%" stop-color="#3A3F4A"/></linearGradient>
    <radialGradient id="rim" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#5A606D"/><stop offset="80%" stop-color="#3A3F4A"/><stop offset="100%" stop-color="#1F2330"/></radialGradient>
    <filter id="rigShadow" x="-10%" y="-10%" width="120%" height="130%"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="4" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <linearGradient id="bowHazeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="bowHaze" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dustCloud" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#C8B89A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C8B89A" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <g class="chassis-bob">

  <rect class="sky-bg" width="1200" height="600" fill="url(#sky)"/>
  <rect x="0" y="380" width="1200" height="70" fill="#FFFFFF" opacity="0.18"/>
  <line x1="60" y1="475" x2="1140" y2="475" stroke="#9B7FD9" stroke-width="4" stroke-dasharray="14 9" stroke-linecap="round" opacity="0.55"/>
  <ellipse cx="640" cy="486" rx="450" ry="7" fill="#1A1F2E" opacity="0.13"/>

  <!-- CAB -->
  <g filter="url(#rigShadow)">
    <path d="M 460 250 L 460 460 L 295 460 L 295 240 Q 295 230 305 230 L 450 230 Q 460 230 460 240 Z" fill="url(#cab)"/>
    <path d="M 295 240 L 295 460 L 195 460 L 195 320 Q 195 300 205 290 L 245 245 Q 255 235 265 235 L 290 235 Q 295 235 295 240 Z" fill="url(#cab)"/>
    <rect x="295" y="232" width="160" height="6" rx="3" fill="url(#cabRoof)"/>
    <path d="M 283 252 Q 267 248 253 252 L 213 295 Q 213 312 230 312 L 283 312 Z" fill="url(#windowGlass)" opacity="0.95"/>
    <rect x="205" y="320" width="74" height="58" rx="6" fill="url(#windowGlass)" opacity="0.85"/>
    <line x1="279" y1="320" x2="279" y2="378" stroke="#0A1F3F" stroke-width="1.5" opacity="0.4"/>
    <rect x="315" y="262" width="120" height="22" rx="4" fill="url(#windowGlass)" opacity="0.7"/>
    <rect x="211" y="345" width="6" height="22" rx="2" fill="#1A1F2E" opacity="0.7"/>
    <ellipse cx="200" cy="345" rx="8" ry="6" fill="#FFE680"/><ellipse cx="200" cy="345" rx="4" ry="3" fill="#FFFFFF"/>
    <rect x="195" y="365" width="14" height="55" rx="3" fill="#0A1F3F" opacity="0.85"/>
    <g stroke="#3A3F4A" stroke-width="1.5"><line x1="197" y1="372" x2="207" y2="372"/><line x1="197" y1="380" x2="207" y2="380"/><line x1="197" y1="388" x2="207" y2="388"/><line x1="197" y1="396" x2="207" y2="396"/><line x1="197" y1="404" x2="207" y2="404"/><line x1="197" y1="412" x2="207" y2="412"/></g>
    <rect x="191" y="435" width="26" height="22" rx="4" fill="#1A1F2E"/><rect x="271" y="438" width="22" height="20" rx="2" fill="#1A1F2E" opacity="0.85"/>
    <line x1="205" y1="328" x2="225" y2="326" stroke="#1A1F2E" stroke-width="2.5" stroke-linecap="round"/><line x1="205" y1="378" x2="225" y2="376" stroke="#1A1F2E" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="222" y="320" width="14" height="64" rx="3" fill="#1A1F2E"/><rect x="225" y="324" width="8" height="42" rx="1.5" fill="url(#windowGlass)" opacity="0.9"/><rect x="225" y="370" width="8" height="10" rx="1.5" fill="url(#windowGlass)" opacity="0.75"/>
    <rect x="288" y="200" width="8" height="60" rx="3" fill="#7A7F88"/><rect x="288" y="200" width="8" height="6" rx="3" fill="#3A3F4A"/>
    <circle cx="377" cy="395" r="9" fill="#FFFFFF" opacity="0.85"/><text x="377" y="399" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="9" fill="#5B3FBF">E</text>
  </g>

  <!-- ========== EMPTY LOWBOY (3-section: gooseneck + low deck + tail) ========== -->
  <g filter="url(#rigShadow)">
    <!-- Gooseneck (front upper section abutting cab) -->
    <path d="M 475 410 L 475 445 L 525 445 L 525 425 L 555 425 L 555 410 Z" fill="url(#deckTop)"/>
    <rect x="475" y="410" width="80" height="3" fill="#FFFFFF" opacity="0.4"/>
    <!-- Low main deck (lower than standard for cargo clearance) -->
    <rect x="555" y="425" width="450" height="33" rx="2" fill="url(#deckTop)"/>
    <rect x="555" y="425" width="450" height="3" fill="#FFFFFF" opacity="0.4"/>
    <!-- Wood deck planks visible (lowboy decks are typically apitong hardwood) -->
    <g stroke="#2A2F38" stroke-width="0.8" opacity="0.55">
      <line x1="555" y1="435" x2="1005" y2="435"/>
      <line x1="555" y1="442" x2="1005" y2="442"/>
      <line x1="555" y1="449" x2="1005" y2="449"/>
    </g>
    <!-- Rear ramp section -->
    <path d="M 1005 425 L 1005 445 L 1055 445 L 1075 425 Z" fill="url(#deckTop)"/>
    <!-- Heavy chassis I-beams -->
    <rect x="555" y="455" width="450" height="6" fill="#1A1F2E"/>
    <!-- Stake pockets -->
    <g fill="#0F1118">
      <rect x="600" y="450" width="6" height="7"/><rect x="680" y="450" width="6" height="7"/>
      <rect x="760" y="450" width="6" height="7"/><rect x="840" y="450" width="6" height="7"/>
      <rect x="920" y="450" width="6" height="7"/>
    </g>
    <!-- Tie-down rings (visible on empty deck — many of them, signature of heavy haul) -->
    <g fill="#FFE680" opacity="0.85">
      <circle cx="585" cy="431" r="4"/><circle cx="640" cy="431" r="4"/><circle cx="695" cy="431" r="4"/>
      <circle cx="750" cy="431" r="4"/><circle cx="805" cy="431" r="4"/><circle cx="860" cy="431" r="4"/>
      <circle cx="915" cy="431" r="4"/><circle cx="970" cy="431" r="4"/>
    </g>
    <!-- Capacity stencil on gooseneck side -->
    <text x="500" y="438" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="9" fill="#FFFFFF" opacity="0.85" letter-spacing="1">80K</text>
    <!-- Gooseneck stamp -->
    <text x="780" y="447" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="11" fill="#FFFFFF" opacity="0.7" letter-spacing="2">RGN LOWBOY · 53'</text>
    <!-- DOT reflectors -->
    <g><rect x="478" y="446" width="20" height="5" fill="#E5350D"/><rect x="498" y="446" width="20" height="5" fill="#FFFFFF"/>
       <rect x="990" y="459" width="20" height="5" fill="#FFFFFF"/><rect x="1010" y="459" width="20" height="5" fill="#E5350D"/><rect x="1030" y="459" width="20" height="5" fill="#FFFFFF"/><rect x="1050" y="459" width="20" height="5" fill="#E5350D"/></g>
  </g>

  <rect x="455" y="445" width="25" height="15" fill="#3A3F4A"/><circle cx="467" cy="453" r="5" fill="#1A1F2E"/>

  
  </g>
  <g id="wheelGroup">
    <circle cx="0" cy="0" r="32" fill="#1A1A1A"/><circle cx="0" cy="0" r="22" fill="url(#rim)"/><circle cx="0" cy="0" r="7" fill="#7A7F88"/>
    <g stroke="#3A3F4A" stroke-width="2.5" stroke-linecap="round"><line x1="0" y1="-19" x2="0" y2="-9"/><line x1="18" y1="-6" x2="9" y2="-3"/><line x1="11" y1="16" x2="6" y2="8"/><line x1="-11" y1="16" x2="-6" y2="8"/><line x1="-18" y1="-6" x2="-9" y2="-3"/></g>
    <ellipse cx="-6" cy="-12" rx="6" ry="3" fill="#FFFFFF" opacity="0.35"/>
  </g>
  <g transform="translate(420 460)">
    <g><use href="#wheelGroup"/><animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.6s" repeatCount="indefinite"/></g>
  </g><g transform="translate(280 460)">
    <g><use href="#wheelGroup"/><animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.6s" repeatCount="indefinite"/></g>
  </g>
  <!-- Lowboys have 3+ rear axles -->
  <g transform="translate(880 460)">
    <g><use href="#wheelGroup"/><animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.6s" repeatCount="indefinite"/></g>
  </g>
  <g transform="translate(950 460)">
    <g><use href="#wheelGroup"/><animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.6s" repeatCount="indefinite"/></g>
  </g>
  <g transform="translate(1020 460)">
    <g><use href="#wheelGroup"/><animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.6s" repeatCount="indefinite"/></g>
  </g>

  <path d="M 458 380 Q 470 370 482 358" stroke="#FF8C00" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 458 388 Q 470 380 482 370" stroke="#1473FF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
  
  <g opacity="0.75">
  </g>
  <!-- ========== SPEED STREAKS ========== -->
  <g stroke="#9B7FD9" stroke-width="2.5" stroke-linecap="round" opacity="0.5">
    <line class="streak"    x1="1090" y1="445" x2="1145" y2="445"/>
    <line class="streak s2" x1="1085" y1="455" x2="1150" y2="455"/>
