      <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.15;0.7;1" dur="2.6s" begin="-1.7s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- ========== TIRE CONTACT DUST ========== -->
  <g filter="url(#softBlur)">
    <ellipse class="tire-dust" cx="420.0" cy="492.0" rx="14" ry="5" fill="url(#dustCloud)"/>
    <ellipse class="tire-dust" cx="280.0" cy="492.0" rx="14" ry="5" fill="url(#dustCloud)" style="animation-delay:-0.4s"/>
    <ellipse class="tire-dust" cx="880.0" cy="492.0" rx="14" ry="5" fill="url(#dustCloud)" style="animation-delay:-0.7s"/>
    <ellipse class="tire-dust" cx="950.0" cy="492.0" rx="14" ry="5" fill="url(#dustCloud)" style="animation-delay:-1.1s"/>
    <ellipse class="tire-dust" cx="1020.0" cy="492.0" rx="14" ry="5" fill="url(#dustCloud)" style="animation-delay:-1.4s"/>
  </g>

