    <rect x="120" y="200" width="960" height="265" rx="6" fill="url(#boxcar)"/>
    <rect x="120" y="200" width="960" height="6" rx="3" fill="#FFFFFF" opacity="0.45"/>
    <rect x="122" y="202" width="956" height="261" rx="5" fill="url(#boxcarSheen)" opacity="0.4"/>
    <!-- Vertical panel seams (corrugated steel exterior) -->
    <g stroke="#5C1F1F" stroke-width="0.8" opacity="0.5">
      <line x1="180" y1="208" x2="180" y2="460"/><line x1="240" y1="208" x2="240" y2="460"/><line x1="300" y1="208" x2="300" y2="460"/>
      <line x1="360" y1="208" x2="360" y2="460"/><line x1="540" y1="208" x2="540" y2="460"/><line x1="700" y1="208" x2="700" y2="460"/>
      <line x1="760" y1="208" x2="760" y2="460"/><line x1="820" y1="208" x2="820" y2="460"/><line x1="880" y1="208" x2="880" y2="460"/>
      <line x1="940" y1="208" x2="940" y2="460"/><line x1="1000" y1="208" x2="1000" y2="460"/>
    </g>
    <!-- Roof seam -->
    <line x1="120" y1="220" x2="1080" y2="220" stroke="#5C1F1F" stroke-width="1" opacity="0.6"/>
    <!-- ========== SLIDING DOOR (signature boxcar feature, slightly off-center) ========== -->
