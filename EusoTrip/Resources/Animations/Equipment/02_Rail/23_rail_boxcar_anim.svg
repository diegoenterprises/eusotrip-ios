      <rect x="700" y="195" width="20" height="6"/><rect x="900" y="195" width="20" height="6"/>
    </g>
    <!-- End ladder (typical boxcar feature) -->
    <g stroke="#1A1F2E" stroke-width="1.5" opacity="0.85">
