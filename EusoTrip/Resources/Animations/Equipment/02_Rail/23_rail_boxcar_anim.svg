    <rect x="608" y="345" width="20" height="8" rx="1" fill="#3A3F4A"/>
    <!-- Door panel grooves -->
    <g stroke="#5C1F1F" stroke-width="0.7" opacity="0.5">
      <line x1="450" y1="230" x2="450" y2="440"/><line x1="490" y1="230" x2="490" y2="440"/><line x1="530" y1="230" x2="530" y2="440"/>
      <line x1="570" y1="230" x2="570" y2="440"/>
    </g>
    <!-- Reporting marks (BNSF or similar) -->
    <text x="240" y="295" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="22" fill="#FFFFFF" opacity="0.95" letter-spacing="2">EUSO</text>
    <text x="240" y="328" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="32" fill="#FFFFFF" opacity="0.95" letter-spacing="3">713 421</text>
    <!-- Capacity stencil -->
    <text x="240" y="395" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="11" fill="#FFFFFF" opacity="0.7" letter-spacing="2">LD LMT 197200</text>
    <text x="240" y="412" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="11" fill="#FFFFFF" opacity="0.7" letter-spacing="2">LT WT 65800</text>
    <!-- 50' label on right side -->
    <text x="850" y="328" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="48" fill="#FFFFFF" opacity="0.18" letter-spacing="2">50'</text>
    <!-- Roof walk grates (small detail across roof) -->
