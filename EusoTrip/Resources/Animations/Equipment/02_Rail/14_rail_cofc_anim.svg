<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"  width="1200" height="600" viewBox="0 50 1200 480" preserveAspectRatio="xMidYMid slice">
  <!--
    14 · Rail · COFC · ANIMATED v2 (vehicle in motion)

    PHYSICS UPGRADE — railcar feels alive on the track:
      • Railcar body clacks vertically ±1px every 0.6s (bogies hitting rail
        joints — the iconic "clack-clack" of a freight train)
      • Lateral hunting yaw — railcar sways side to side ±0.4deg @ 2.8s
        (the natural lateral oscillation of railcars at speed)
      • Container settles with -0.08s phase delay vs flatcar (rigging
        compliance — container "lags" the chassis a hair)
      • Ballast spray behind the trailing (rear) bogie — small dust kicks
      • Bogies stay on rails (unsprung mass — rails do all the work)
      • Wheels keep their SMIL CCW spin
      • Track + ties scroll left, ballast dust drifts (parallax)
      • Plus: container sheen, wordmark breath, twist-lock pulse,
        ISO code fade, reporting marks fade, sky shimmer, chevron pulse
  -->
  <style><![CDATA[
    /* ========== RAIL JOINT CLACK-CLACK ========== */
    /* Body bounces vertically each time bogies cross a rail joint. */
    .rail-clack    { animation: rail-clack 0.6s ease-in-out infinite; }
    @keyframes rail-clack {
      0%,  50%, 100% { transform: translateY(0); }
      25%            { transform: translateY(-1px); }
      75%            { transform: translateY(-0.6px); }
    }
    /* HUNTING YAW — slow lateral sway, the natural railcar mode */
    .rail-yaw      { transform-origin: 600px 470px;
                      animation: rail-yaw 2.8s ease-in-out infinite; }
    @keyframes rail-yaw {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(-0.35deg); }
    }
    /* Container settles with phase delay (rigging compliance) */
    .container-settle { animation: container-settle 0.6s ease-in-out infinite -0.08s; }
    @keyframes container-settle {
      0%, 50%, 100% { transform: translateY(0); }
      25%           { transform: translateY(-0.6px); }
      75%           { transform: translateY(-0.3px); }
    }

    /* Ballast spray behind trailing bogie (right side) */
    .spray         { animation: spray-kick 0.7s ease-out infinite; }
    .spray.b       { animation-delay: -0.3s; }
    .spray.c       { animation-delay: -0.5s; }
    @keyframes spray-kick {
      0%   { opacity: 0;    transform: translate(0,0)    scale(0.4); }
      20%  { opacity: 0.55; }
      100% { opacity: 0;    transform: translate(28px,-6px) scale(1.1); }
    }

    /* ========== ORIGINAL VOCAB ========== */
    .sheen { animation: sheen-sweep 5s ease-in-out infinite; transform-box: fill-box; }
    @keyframes sheen-sweep {
      0%   { transform: translateX(-300px); opacity: 0; }
      30%  { opacity: 0.5; }
      70%  { opacity: 0.5; }
      100% { transform: translateX(300px); opacity: 0; }
    }
    .wordmark { animation: wordmark-breath 6s ease-in-out infinite; }
    @keyframes wordmark-breath {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }
    .twist-lock { animation: twist-pulse 2.4s ease-in-out infinite; }
    @keyframes twist-pulse {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }
    .reporting { animation: reporting-fade 7s ease-in-out infinite; }
    @keyframes reporting-fade {
      0%, 100% { opacity: 0.78; }
      50%      { opacity: 0.95; }
    }
    .iso-code { animation: iso-fade 5s ease-in-out infinite; }
    @keyframes iso-fade {
      0%, 100% { opacity: 0.7; }
      50%      { opacity: 0.9; }
    }
    .chevron { animation: chevron-pulse 2.2s ease-in-out infinite; }
    @keyframes chevron-pulse {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 0.65; }
    }
    .sky-shimmer { animation: sky-drift 14s linear infinite; transform-box: fill-box; }
    @keyframes sky-drift {
      from { transform: translateX(-40px); opacity: 0.12; }
      50%  { opacity: 0.22; }
      to   { transform: translateX(40px); opacity: 0.12; }
    }
    /* Rail texture scroll LOCKED to wheel roll: tire r=22 -> circumference 138.2px,
       wheels spin 1 rev / 1.4s = 98.7 px/s. The railhead is near-solid steel with a thin
       2px joint gap every 60px (dasharray 58 2); scrolling those joints -60px / 0.6s =
       100 px/s tracks the wheels to ~1% (no wheel-slip), and a joint passes every 0.6s —
       exactly the .rail-clack period, so each clack lands as a joint slides under a bogie.
       (A solid "40 0" dash is invisible when scrolled — joints make the motion read.) */
    .rail-line { stroke-dasharray: 58 2;
                  animation: rail-scroll 0.6s linear infinite; }
    @keyframes rail-scroll {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -60; }
    }
    .ballast { animation: ballast-drift 3s ease-in-out infinite; transform-box: fill-box; }
    @keyframes ballast-drift {
      0%, 100% { transform: translateX(0); opacity: 0.25; }
      50%      { transform: translateX(-8px); opacity: 0.32; }
    }
    /* ========== BRAND LOCKUP ========== */
    .brand-mark {
      transform-box: fill-box; transform-origin: center;
      animation: brand-pulse 3.6s ease-in-out infinite;
    }
    @keyframes brand-pulse {
      0%, 100% { transform: scale(1);    opacity: 0.92; }
      50%      { transform: scale(1.05); opacity: 1; }
    }
    .brand-word { animation: brand-word-breath 6s ease-in-out infinite; }
    @keyframes brand-word-breath {
      0%, 100% { opacity: 0.78; }
      50%      { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .rail-clack, .rail-yaw, .container-settle, .spray,
      .sheen, .wordmark, .twist-lock, .reporting, .iso-code,
      .chevron, .sky-shimmer, .rail-line, .ballast, .brand-mark, .brand-word { animation: none !important; }
    }
  
    /* ========== DARK-MODE OVERRIDES (2026-05-16) ========== */
    @media (prefers-color-scheme: dark) {
      .sky-bg          { fill: url(#skyDark) !important; }
      .ground-line     { stroke: #5E4FC6 !important; opacity: 0.55 !important; }
      .ground-shadow   { fill: #060912 !important; opacity: 0.55 !important; }
      .brand-word      { fill: #C9B6FF !important; }
      .brand-tagline   { fill: #8B7FE3 !important; }
      .equipment-label { fill: #C9B6FF !important; }
      .equipment-sub   { fill: #8B7FE3 !important; }
      .equipment-rule  { stroke: #6E4DFF !important; }
    }
  ]]></style>

  <defs>
        <linearGradient id="skyDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0A0F1F"/>
      <stop offset="55%" stop-color="#141A2E"/>
      <stop offset="100%" stop-color="#0B0F1B"/>
    </linearGradient>
    <linearGradient id="brandIridescent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1473FF"/>
      <stop offset="50%" stop-color="#6E4DFF"/>
      <stop offset="100%" stop-color="#BE01FF"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF1FA"/><stop offset="55%" stop-color="#F5EEFC"/><stop offset="100%" stop-color="#EFF8FA"/>
    </linearGradient>
    <linearGradient id="container" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DBEEC"/><stop offset="55%" stop-color="#5BA3D8"/><stop offset="100%" stop-color="#3D7CB8"/>
    </linearGradient>
    <linearGradient id="containerSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flatcar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2D38"/><stop offset="100%" stop-color="#0F1118"/>
    </linearGradient>
    <radialGradient id="rim" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5A606D"/><stop offset="80%" stop-color="#3A3F4A"/><stop offset="100%" stop-color="#1F2330"/>
    </radialGradient>
    <linearGradient id="tie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5A40"/><stop offset="100%" stop-color="#3F2F22"/>
    </linearGradient>
    <radialGradient id="dustCloud" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#C8B89A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C8B89A" stop-opacity="0"/>
    </radialGradient>
    <filter id="rigShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <symbol id="bogieWheel" overflow="visible">
      <circle cx="0" cy="0" r="22" fill="#1A1A1A"/>
      <circle cx="0" cy="0" r="14" fill="url(#rim)"/>
      <circle cx="0" cy="0" r="5" fill="#7A7F88"/>
      <g stroke="#3A3F4A" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-13" x2="0" y2="-6"/>
        <line x1="12" y1="-4" x2="6" y2="-2"/>
        <line x1="8" y1="11" x2="4" y2="5"/>
        <line x1="-8" y1="11" x2="-4" y2="5"/>
        <line x1="-12" y1="-4" x2="-6" y2="-2"/>
      </g>
      <ellipse cx="-4" cy="-7" rx="4" ry="2" fill="#FFFFFF" opacity="0.35"/>
    </symbol>
  </defs>

  <!-- BACKGROUND -->
  <rect class="sky-bg" width="1200" height="600" fill="url(#sky)"/>
  <rect class="sky-shimmer" x="0" y="380" width="1200" height="70" fill="#FFFFFF" opacity="0.18"/>

  <!-- ROADBED + ballast dust -->
  <rect x="40" y="510" width="1120" height="20" fill="#9B7FD9" opacity="0.18"/>
  <g class="ballast" fill="#5B3FBF" opacity="0.25">
    <circle cx="80" cy="518" r="1.5"/><circle cx="160" cy="522" r="1.5"/><circle cx="240" cy="516" r="1.5"/>
    <circle cx="320" cy="524" r="1.5"/><circle cx="400" cy="518" r="1.5"/><circle cx="480" cy="522" r="1.5"/>
    <circle cx="560" cy="516" r="1.5"/><circle cx="640" cy="524" r="1.5"/><circle cx="720" cy="518" r="1.5"/>
    <circle cx="800" cy="522" r="1.5"/><circle cx="880" cy="516" r="1.5"/><circle cx="960" cy="524" r="1.5"/>
    <circle cx="1040" cy="518" r="1.5"/><circle cx="1120" cy="522" r="1.5"/>
  </g>

  <!-- TIES -->
  <g>
    <rect x="80"  y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="140" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="200" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="260" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="320" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="380" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="440" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="500" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="560" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="620" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="680" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="740" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="800" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="860" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="920" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="980" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="1040" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
    <rect x="1100" y="498" width="40" height="14" rx="1" fill="url(#tie)"/>
  </g>

  <!-- RAILS -->
  <line class="rail-line" x1="40" y1="495" x2="1160" y2="495"
        stroke="#7A7F88" stroke-width="6" stroke-linecap="butt"/>
  <line class="rail-line" x1="40" y1="493" x2="1160" y2="493"
        stroke="#C0C5CD" stroke-width="2" stroke-linecap="butt"/>

  <!-- DROP SHADOW (stays put) -->
  <ellipse cx="600" cy="488" rx="490" ry="6" fill="#1A1F2E" opacity="0.13"/>

  <!-- BALLAST SPRAY behind trailing (rear) bogie — particles kick up and back -->
  <g filter="url(#softBlur)">
    <ellipse class="spray"   cx="1030" cy="500" rx="6" ry="3" fill="url(#dustCloud)"/>
    <ellipse class="spray b" cx="1030" cy="500" rx="5" ry="2.5" fill="url(#dustCloud)"/>
    <ellipse class="spray c" cx="1030" cy="500" rx="4" ry="2" fill="url(#dustCloud)"/>
  </g>

  <!-- ========== RAILCAR BODY — wraps in clack + yaw + container-settle ========== -->
  <g class="rail-yaw">
    <g class="rail-clack">

      <!-- FLATCAR DECK -->
      <g filter="url(#rigShadow)">
        <rect x="120" y="430" width="960" height="38" rx="3" fill="url(#flatcar)"/>
        <rect x="120" y="430" width="960" height="3" rx="1" fill="#FFFFFF" opacity="0.35"/>
        <rect x="120" y="445" width="960" height="6" fill="#5A606D" opacity="0.55"/>

        <text class="reporting" x="160" y="461" font-family="Inter, system-ui, sans-serif"
              font-weight="800" font-size="11" fill="#9B7FD9">EUSO 7142</text>

        <g fill="#0F1118">
          <rect x="200" y="460" width="6" height="6"/><rect x="280" y="460" width="6" height="6"/>
          <rect x="360" y="460" width="6" height="6"/><rect x="440" y="460" width="6" height="6"/>
          <rect x="520" y="460" width="6" height="6"/><rect x="600" y="460" width="6" height="6"/>
          <rect x="680" y="460" width="6" height="6"/><rect x="760" y="460" width="6" height="6"/>
          <rect x="840" y="460" width="6" height="6"/><rect x="920" y="460" width="6" height="6"/>
          <rect x="1000" y="460" width="6" height="6"/>
        </g>

        <rect x="100" y="450" width="22" height="14" rx="2" fill="#3A3F4A"/>
        <rect x="92" y="453" width="14" height="8" rx="1" fill="#1A1F2E"/>
        <rect x="1078" y="450" width="22" height="14" rx="2" fill="#3A3F4A"/>
        <rect x="1094" y="453" width="14" height="8" rx="1" fill="#1A1F2E"/>
      </g>

      <!-- CONTAINER (with -0.08s phase delay vs flatcar) -->
      <g class="container-settle">
        <g filter="url(#rigShadow)">
          <rect x="180" y="240" width="840" height="190" rx="3" fill="url(#container)"/>
          <rect x="180" y="240" width="840" height="5" rx="2" fill="#FFFFFF" opacity="0.55"/>

          <g clip-path="inset(240px 180px 170px 180px)">
            <rect class="sheen" x="180" y="242" width="280" height="186" rx="2"
                  fill="url(#containerSheen)" opacity="0.4"/>
          </g>

          <g stroke="#2C5C88" stroke-width="0.8" opacity="0.55">
            <line x1="220" y1="248" x2="220" y2="425"/><line x1="260" y1="248" x2="260" y2="425"/>
            <line x1="300" y1="248" x2="300" y2="425"/><line x1="340" y1="248" x2="340" y2="425"/>
            <line x1="380" y1="248" x2="380" y2="425"/><line x1="420" y1="248" x2="420" y2="425"/>
            <line x1="460" y1="248" x2="460" y2="425"/><line x1="500" y1="248" x2="500" y2="425"/>
            <line x1="540" y1="248" x2="540" y2="425"/><line x1="580" y1="248" x2="580" y2="425"/>
            <line x1="620" y1="248" x2="620" y2="425"/><line x1="660" y1="248" x2="660" y2="425"/>
            <line x1="700" y1="248" x2="700" y2="425"/><line x1="740" y1="248" x2="740" y2="425"/>
            <line x1="780" y1="248" x2="780" y2="425"/><line x1="820" y1="248" x2="820" y2="425"/>
            <line x1="860" y1="248" x2="860" y2="425"/><line x1="900" y1="248" x2="900" y2="425"/>
            <line x1="940" y1="248" x2="940" y2="425"/><line x1="980" y1="248" x2="980" y2="425"/>
          </g>

          <rect x="180" y="240" width="14" height="190" fill="#2C5C88" opacity="0.6"/>
          <rect x="1006" y="240" width="14" height="190" fill="#2C5C88" opacity="0.6"/>

          <g stroke="#1A3F60" stroke-width="1" opacity="0.7">
            <line x1="985" y1="248" x2="985" y2="425"/>
            <line x1="1005" y1="248" x2="1005" y2="425"/>
          </g>
          <g fill="#1A3F60" opacity="0.85">
            <rect x="990" y="270" width="3" height="140" rx="1"/>
            <rect x="998" y="270" width="3" height="140" rx="1"/>
          </g>
          <rect x="985" y="335" width="20" height="3" fill="#1A3F60"/>

          <text class="wordmark" x="600" y="320" text-anchor="middle"
                font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="38"
                fill="#FFFFFF" letter-spacing="3">EUSO 8843</text>
          <text class="iso-code" x="600" y="350" text-anchor="middle"
                font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="16"
                fill="#FFFFFF" letter-spacing="2">42G1</text>
        </g>

        <!-- TWIST LOCKS (move with container) -->
        <g class="twist-lock" fill="#FFE680">
          <rect x="186" y="425" width="10" height="8"/>
          <rect x="1004" y="425" width="10" height="8"/>
        </g>
      </g>

    </g>
  </g>

  <!-- ========== BOGIES — STAY ON RAILS (no clack, just spin) ========== -->
  <g filter="url(#rigShadow)">
    <rect x="170" y="468" width="100" height="22" rx="3" fill="#3A3F4A"/>
    <rect x="170" y="468" width="100" height="3" fill="#FFFFFF" opacity="0.35"/>
  </g>
  <g transform="translate(190 498)">
    <g><use href="#bogieWheel"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.4s" repeatCount="indefinite"/></g>
  </g>
  <g transform="translate(250 498)">
    <g><use href="#bogieWheel"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.4s" repeatCount="indefinite"/></g>
  </g>

  <g filter="url(#rigShadow)">
    <rect x="930" y="468" width="100" height="22" rx="3" fill="#3A3F4A"/>
    <rect x="930" y="468" width="100" height="3" fill="#FFFFFF" opacity="0.35"/>
  </g>
  <g transform="translate(950 498)">
    <g><use href="#bogieWheel"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.4s" repeatCount="indefinite"/></g>
  </g>
  <g transform="translate(1010 498)">
    <g><use href="#bogieWheel"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.4s" repeatCount="indefinite"/></g>
  </g>

  <!-- BADGES + LABEL + CHEVRON -->
  
  <g opacity="0.75">
  </g>
  <g class="chevron">
    <path d="M 70 540 L 55 525 L 55 555 Z" fill="#9B7FD9"/>
  </g>
  <!-- ========== EUSOTRIP BRAND LOCKUP ========== -->
  
  
  <!-- EUSOTRIP-FIX-2026-05-17 -->
</svg>
