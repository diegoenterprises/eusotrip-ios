  <!-- ========== WELL CAR (depressed center — characteristic intermodal shape) ========== -->
  <g filter="url(#rigShadow)">
    <!-- End walls (left and right raised platforms) -->
    <path d="M 100 430 L 100 475 L 200 475 L 200 480 L 270 480 L 270 460 L 270 430 Z" fill="url(#wellCar)"/>
    <path d="M 1100 430 L 1100 475 L 1000 475 L 1000 480 L 930 480 L 930 460 L 930 430 Z" fill="url(#wellCar)"/>
    <!-- Well floor (depressed deck — lower than end walls so containers can stack double-high) -->
    <rect x="270" y="460" width="660" height="20" fill="url(#wellCar)"/>
    <!-- Side beams (the structural rails along the side of the well) -->
    <rect x="270" y="455" width="660" height="6" fill="#5A606D" opacity="0.6"/>
    <!-- Reporting marks -->
    <text x="320" y="473" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="11" fill="#9B7FD9" opacity="0.85">EUSO 7142 · WELL CAR</text>
    <!-- ============================================================
         COUNTRY-SWITCHABLE WELL-CAR STENCIL (reporting authority + capacity units)
         Rail intermodal interchange operates US/MX/CA; reporting authority + unit
         stencil differ by country of operation. The renderer shows exactly ONE of
         these by toggling visibility on the matching class: default country-US is
         visible; for MX/CA the app sets style="display:none" on the others (e.g.
         querySelectorAll('.country-US').forEach(n=>n.style.display='none')).
         US: AAR/FRA, capacity in LB · MX: SICT (ex-SCT)/NOM, kg · CA: TC/TDG, kg.
         ============================================================ -->
    <g class="country-US">
      <text x="490" y="473" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="9" letter-spacing="0.6" fill="#7A5AB8" opacity="0.8">AAR FCA · CAP 198000 LB</text>
    </g>
    <g class="country-MX" style="display:none">
      <text x="490" y="473" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="9" letter-spacing="0.6" fill="#7A5AB8" opacity="0.8">SICT/NOM · CAP 89800 KG</text>
    </g>
    <g class="country-CA" style="display:none">
      <text x="490" y="473" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="9" letter-spacing="0.6" fill="#7A5AB8" opacity="0.8">TC/TDG · CAP 89800 KG</text>
    </g>
