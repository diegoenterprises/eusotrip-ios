      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.4s" repeatCount="indefinite"/>
    </g>
  </g>
  <g transform="translate(1010 498)">
    <g>
      <circle cx="0" cy="0" r="22" fill="#1A1A1A"/>
      <circle cx="0" cy="0" r="14" fill="url(#rim)"/>
      <circle cx="0" cy="0" r="5" fill="#7A7F88"/>
      <ellipse cx="-4" cy="-7" rx="4" ry="2" fill="#FFFFFF" opacity="0.35"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.4s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <g opacity="0.75">
  </g>
  <!-- ========== BALLAST SPRAY behind trailing bogie ========== -->
  <g filter="url(#softBlur)">
    <ellipse class="spray"   cx="1030" cy="500" rx="6" ry="3" fill="url(#dustCloud)"/>
    <ellipse class="spray b" cx="1030" cy="500" rx="5" ry="2.5" fill="url(#dustCloud)"/>
    <ellipse class="spray c" cx="1030" cy="500" rx="4" ry="2" fill="url(#dustCloud)"/>
  </g>

  <!-- ========== EUSOTRIP BRAND LOCKUP ========== -->
  
  
