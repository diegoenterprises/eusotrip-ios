      <rect x="595" y="470" width="10" height="6" fill="#1A1F2E"/>
      <rect x="589" y="465" width="22" height="3" fill="#5A606D"/>
    </g>

    <!-- ========== HAZMAT PLACARDS (Class 3 Flammable — typical for crude oil / ethanol) ========== -->
    <g transform="translate(320 380) rotate(45)">
      <rect x="-25" y="-25" width="50" height="50" fill="#E5350D" stroke="#000000" stroke-width="2"/>
      <g transform="rotate(-45)">
