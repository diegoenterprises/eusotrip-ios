        <text y="11" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="7" fill="#FFFFFF">FLAMMABLE</text>
      </g>
    </g>
    <g transform="translate(880 380) rotate(45)">
      <rect x="-25" y="-25" width="50" height="50" fill="#E5350D" stroke="#000000" stroke-width="2"/>
      <g transform="rotate(-45)">
