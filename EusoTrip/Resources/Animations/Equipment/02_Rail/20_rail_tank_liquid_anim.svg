      <!-- Dome base (the small raised cylinder housing the manway) -->
      <ellipse cx="600" cy="280" rx="28" ry="6" fill="#3A3F4A"/>
      <rect x="572" y="258" width="56" height="22" rx="2" fill="#7A7F88"/>
