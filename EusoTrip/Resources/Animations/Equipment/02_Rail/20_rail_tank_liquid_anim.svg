  <!-- ========== TANK BARREL — long stainless cylinder ========== -->
  <g filter="url(#rigShadow)">
    <!-- Tank body -->
    <path d="M 175 295 Q 175 280 195 280 L 1005 280 Q 1025 280 1025 295 L 1025 445 Q 1025 460 1005 460 L 195 460 Q 175 460 175 445 Z"
