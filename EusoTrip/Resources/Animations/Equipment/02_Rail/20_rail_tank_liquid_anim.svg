      <ellipse cx="600" cy="256" rx="18" ry="3" fill="#5A606D"/>
      <!-- Small vent / pressure relief on top -->
      <rect x="595" y="244" width="10" height="14" fill="#1A1F2E"/>
      <circle cx="600" cy="242" r="5" fill="#7A7F88"/>
    </g>

    <!-- Catwalk along the top of barrel -->
    <rect x="190" y="277" width="382" height="5" fill="#3A3F4A"/>
    <rect x="628" y="277" width="382" height="5" fill="#3A3F4A"/>

