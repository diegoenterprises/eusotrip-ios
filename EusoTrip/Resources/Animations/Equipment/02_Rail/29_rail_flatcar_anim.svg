<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 200 1200 340" preserveAspectRatio="xMidYMid meet">
  <style><![CDATA[
    /* ========== RAIL JOINT CLACK-CLACK ==========
       Real bogie over a 39' rail joint: a sharp steel-on-steel jolt
       (quick rise, fast settle) repeated as each truck hits the gap —
       a snappy double-tap, NOT a soft sinusoid. */
    .rail-clack    { animation: rail-clack 0.62s cubic-bezier(0.3,0,0.2,1) infinite; }
    @keyframes rail-clack {
      0%             { transform: translateY(0); }
      8%             { transform: translateY(-1.1px); }   /* lead truck impact */
      24%            { transform: translateY(0); }
      50%            { transform: translateY(0); }
      58%            { transform: translateY(-0.7px); }   /* trailing truck impact */
      74%, 100%      { transform: translateY(0); }
    }
    .rail-yaw      { transform-origin: 600px 470px;
                      animation: rail-yaw 2.8s ease-in-out infinite; }
    @keyframes rail-yaw {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(-0.35deg); }
    }
    /* Ballast spray kicked up behind the trailing bogie (dust loop). */
    .spray         { animation: spray-kick 0.7s ease-out infinite; }
    .spray.b       { animation-delay: -0.3s; }
    .spray.c       { animation-delay: -0.5s; }
    @keyframes spray-kick {
      0%   { opacity: 0;    transform: translate(0,0)    scale(0.4); }
      20%  { opacity: 0.55; }
      100% { opacity: 0;    transform: translate(28px,-6px) scale(1.1); }
    }

    /* Country stencil switch: renderer toggles visibility of one group.
       Default = US (AAR plate / LBS). Set the others to display:inline
       and this to none for CA (Transport Canada / kg) or MX (SCT / kg). */
    .country-CA, .country-MX { display: none; }
    .country-US { display: inline; }

    @media (prefers-reduced-motion: reduce) {
      /* Still the train: freeze the joint clack, yaw and dust spray.
         (Wheel rotation is SMIL <animateTransform>; renderers that honor
          reduced-motion pause SMIL declaratively — see wheels below.) */
      .rail-clack, .rail-yaw, .spray { animation: none !important; }
    }
  
    /* ========== DARK-MODE OVERRIDES (2026-05-16) ========== */
    @media (prefers-color-scheme: dark) {
      .sky-bg          { fill: url(#skyDark) !important; }
      .ground-line     { stroke: #5E4FC6 !important; opacity: 0.55 !important; }
      .ground-shadow   { fill: #060912 !important; opacity: 0.55 !important; }
      .brand-word      { fill: #C9B6FF !important; }
      .brand-tagline   { fill: #8B7FE3 !important; }
      .equipment-label { fill: #C9B6FF !important; }
      .equipment-sub   { fill: #8B7FE3 !important; }
      .equipment-rule  { stroke: #6E4DFF !important; }
    }
  ]]></style>

  <!-- 29 · Rail · Flat Car · Standalone idle silhouette · RAIL / LBS
       Empty general-purpose rail flatcar (no container, no trailer). -->
  <defs>
