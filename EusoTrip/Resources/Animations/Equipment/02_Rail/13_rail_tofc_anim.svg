      <line x1="600" y1="230" x2="600" y2="420"/><line x1="680" y1="230" x2="680" y2="420"/><line x1="760" y1="230" x2="760" y2="420"/><line x1="840" y1="230" x2="840" y2="420"/><line x1="920" y1="230" x2="920" y2="420"/>
