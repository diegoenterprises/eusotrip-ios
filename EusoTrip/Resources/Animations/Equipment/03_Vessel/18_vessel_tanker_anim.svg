<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"  width="1200" height="600" viewBox="0 50 1200 480" preserveAspectRatio="xMidYMid slice">
  <style><![CDATA[
    /* ========== HULL PITCH — ocean swell, bow rises and falls ========== */
    .hull-pitch {
      transform-origin: 600px 470px;
      animation: hull-pitch 7s ease-in-out infinite;
    }
    @keyframes hull-pitch {
      0%, 100% { transform: rotate(0deg);     }
      25%      { transform: rotate(-0.4deg);  }
      50%      { transform: rotate(0deg);     }
      75%      { transform: rotate(0.35deg);  }
    }
    .hull-roll {
      transform-origin: 600px 470px;
      animation: hull-roll 5.6s ease-in-out infinite;
    }
    @keyframes hull-roll {
      0%, 100% { transform: translateY(0)    skewX(0deg);   }
      50%      { transform: translateY(-1px) skewX(0.3deg); }
    }
    .stack-settle {
      animation: stack-settle 7s ease-in-out infinite -0.4s;
    }
    @keyframes stack-settle {
      0%, 100% { transform: translateY(0); }
      25%      { transform: translateY(0.6px); }
      75%      { transform: translateY(-0.6px); }
    }
    .antenna-arc {
      animation: antenna-arc 7s ease-in-out infinite;
    }
    @keyframes antenna-arc {
      0%, 100% { transform: translate(0,0); }
      25%      { transform: translate(-0.8px, 1px); }
      50%      { transform: translate(0,0); }
      75%      { transform: translate(0.8px, -1px); }
    }
    .bow-wave-1 { animation: bow-wave 2.4s ease-out infinite; }
    .bow-wave-2 { animation: bow-wave 2.4s ease-out infinite -0.8s; }
    .bow-wave-3 { animation: bow-wave 2.4s ease-out infinite -1.6s; }
    @keyframes bow-wave {
      0%   { opacity: 0;    transform: translateX(0)    scale(0.5); }
      15%  { opacity: 0.85; }
      100% { opacity: 0;    transform: translateX(-32px) scale(1.6); }
    }
    .bow-spray {
      animation: bow-spray 1.6s ease-out infinite;
    }
    @keyframes bow-spray {
      0%   { opacity: 0;   transform: translate(0,0)      scale(0.5); }
      20%  { opacity: 0.6; }
      100% { opacity: 0;   transform: translate(-22px,-14px) scale(1.3); }
    }
    .wake-1 { animation: wake-drift 3.2s linear infinite; }
    .wake-2 { animation: wake-drift 3.2s linear infinite -0.7s; }
    .wake-3 { animation: wake-drift 3.2s linear infinite -1.4s; }
    .wake-4 { animation: wake-drift 3.2s linear infinite -2.1s; }
    @keyframes wake-drift {
      0%   { opacity: 0;    transform: translateX(0)   scale(0.6); }
      15%  { opacity: 0.7;  }
      85%  { opacity: 0.3;  }
      100% { opacity: 0;    transform: translateX(85px) scale(1.4); }
    }

    /* ========== ORIGINAL VOCAB ========== */
    .sheen-band { animation: sheen-sweep 5s ease-in-out infinite; }
    @keyframes sheen-sweep {
      0%   { transform: translateX(-740px); }
      60%  { transform: translateX(740px); }
      100% { transform: translateX(740px); }
    }
    .wordmark-breath { animation: wordmark-breath 6s ease-in-out infinite; }
    @keyframes wordmark-breath {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.85; }
    }
    .badge-pulse {
      transform-box: fill-box; transform-origin: center;
      animation: badge-pulse 3.2s ease-in-out infinite;
    }
    @keyframes badge-pulse {
      0%, 100% { transform: scale(1);    opacity: 0.95; }
      50%      { transform: scale(1.04); opacity: 1; }
    }
    .chevron-pulse { animation: chevron-pulse 2.2s ease-in-out infinite; }
    @keyframes chevron-pulse {
      0%, 100% { opacity: 0.30; transform: translateX(0); }
      50%      { opacity: 0.65; transform: translateX(-4px); }
    }
    .sky-drift { animation: sky-drift 14s ease-in-out infinite; }
    @keyframes sky-drift {
      0%   { transform: translateX(-200px); }
      100% { transform: translateX(1400px); }
    }
    .bridge-window-pulse { animation: bridge-window-pulse 4s ease-in-out infinite; }
    @keyframes bridge-window-pulse {
      0%, 100% { opacity: 0.78; }
      50%      { opacity: 0.95; }
    }
    .antenna-blink {
      animation: antenna-blink 1.4s ease-in-out infinite;
      transform-box: fill-box; transform-origin: center;
    }
    @keyframes antenna-blink {
      0%, 65%, 100% { opacity: 0.35; transform: scale(1); }
      70%, 80%      { opacity: 1;    transform: scale(1.25); }
    }
    .bow-pulse { animation: bow-pulse 2.6s ease-in-out infinite; }
    @keyframes bow-pulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.95; }
    }
    .draft-fade { animation: draft-fade 7s ease-in-out infinite; }
    @keyframes draft-fade {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.78; }
    }
    /* ========== BRAND LOCKUP ========== */
    .brand-mark {
      transform-box: fill-box; transform-origin: center;
      animation: brand-pulse 3.6s ease-in-out infinite;
    }
    @keyframes brand-pulse {
      0%, 100% { transform: scale(1);    opacity: 0.92; }
      50%      { transform: scale(1.05); opacity: 1; }
    }
    .brand-word { animation: brand-word-breath 6s ease-in-out infinite; }
    @keyframes brand-word-breath {
      0%, 100% { opacity: 0.78; }
      50%      { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hull-pitch, .hull-roll, .stack-settle, .antenna-arc,
      .bow-wave-1, .bow-wave-2, .bow-wave-3, .bow-spray,
      .wake-1, .wake-2, .wake-3, .wake-4,
      .sheen-band, .wordmark-breath, .badge-pulse, .chevron-pulse,
      .sky-drift, .bridge-window-pulse, .antenna-blink,
      .bow-pulse, .draft-fade, .brand-mark, .brand-word { animation: none !important; }
    }
  
    /* ========== DARK-MODE OVERRIDES (2026-05-16) ========== */
    @media (prefers-color-scheme: dark) {
      .sky-bg          { fill: url(#skyDark) !important; }
      .ground-line     { stroke: #5E4FC6 !important; opacity: 0.55 !important; }
      .ground-shadow   { fill: #060912 !important; opacity: 0.55 !important; }
      .brand-word      { fill: #C9B6FF !important; }
      .brand-tagline   { fill: #8B7FE3 !important; }
      .equipment-label { fill: #C9B6FF !important; }
      .equipment-sub   { fill: #8B7FE3 !important; }
      .equipment-rule  { stroke: #6E4DFF !important; }
    }
  ]]></style>

  <!-- 18 · Vessel · Tanker · EquipmentKind: vesselTanker · VESSEL / BBL
       Oil/product tanker. Long flat deck with central manifold piping. Bow on LEFT.
       Used for: crude oil, refined products, chemicals. -->
  <defs>
        <linearGradient id="skyDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0A0F1F"/>
      <stop offset="55%" stop-color="#141A2E"/>
      <stop offset="100%" stop-color="#0B0F1B"/>
    </linearGradient>
    <linearGradient id="brandIridescent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1473FF"/>
      <stop offset="50%" stop-color="#6E4DFF"/>
      <stop offset="100%" stop-color="#BE01FF"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EEF1FA"/><stop offset="55%" stop-color="#F5EEFC"/><stop offset="100%" stop-color="#EFF8FA"/></linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2A3045"/><stop offset="100%" stop-color="#0F1320"/></linearGradient>
    <linearGradient id="hullDeck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A4258"/>
      <stop offset="100%" stop-color="#1F2330"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0AC2C2" stop-opacity="0.35"/><stop offset="100%" stop-color="#1473FF" stop-opacity="0.08"/></linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FAFBFD"/><stop offset="100%" stop-color="#C8CDD8"/></linearGradient>
    <linearGradient id="windowGlass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#BFD3FF"/><stop offset="100%" stop-color="#7E9DDB"/></linearGradient>
    <filter id="rigShadow" x="-10%" y="-10%" width="120%" height="130%"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="4" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <radialGradient id="foam" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="foamBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="smokeBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <g class="hull-pitch">
    <g class="hull-roll">

  <rect class="sky-bg" width="1200" height="600" fill="url(#sky)"/>
  <rect x="0" y="380" width="1200" height="70" fill="#FFFFFF" opacity="0.18"/>

  <rect x="0" y="470" width="1200" height="80" fill="url(#water)"/>
  <g stroke="#0AC2C2" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <line x1="60" y1="490" x2="160" y2="490" stroke-dasharray="14 9"/><line x1="200" y1="510" x2="320" y2="510" stroke-dasharray="14 9"/><line x1="380" y1="495" x2="490" y2="495" stroke-dasharray="14 9"/><line x1="540" y1="515" x2="660" y2="515" stroke-dasharray="14 9"/><line x1="710" y1="500" x2="820" y2="500" stroke-dasharray="14 9"/><line x1="870" y1="520" x2="980" y2="520" stroke-dasharray="14 9"/><line x1="1020" y1="495" x2="1140" y2="495" stroke-dasharray="14 9"/>
  </g>

  <!-- HULL — bow LEFT, stern RIGHT -->
  <g filter="url(#rigShadow)">
    <ellipse cx="92" cy="487" rx="28" ry="9" fill="url(#hull)"/>
    <path d="M 100 470 L 110 408 Q 120 395 145 392 L 1090 392 Q 1110 392 1110 410 L 1110 470 Z" fill="url(#hull)"/>
    <path d="M 110 408 Q 120 395 145 392 L 1090 392 Q 1110 392 1110 410" stroke="#3A4258" stroke-width="2" fill="none" opacity="0.7"/>
    <line x1="120" y1="430" x2="1108" y2="430" stroke="#3A4258" stroke-width="1.5" opacity="0.5"/>
    <line x1="118" y1="395" x2="125" y2="465" stroke="#0AC2C2" stroke-width="2" opacity="0.7"/>
    <g transform="translate(135 425)"><line x1="0" y1="0" x2="0" y2="14" stroke="#0AC2C2" stroke-width="1.5"/><path d="M -4 12 L 4 12 L 0 18 Z" fill="#0AC2C2" opacity="0.9"/></g>
    <g fill="#FFFFFF" opacity="0.65" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="9"><text x="190" y="455">M</text><text x="220" y="455">S</text><text x="250" y="455">W</text></g>
    <circle cx="148" cy="448" r="5" fill="#0F1320" stroke="#3A4258" stroke-width="1"/>
  <!-- "T" tanker class marking on bow -->
    <g>
      <rect x="160" y="405" width="22" height="22" rx="2" fill="#FFFFFF" opacity="0.85"/>
      <text x="171" y="421" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="14" fill="#0F1320">T</text>
    </g>
  </g>

  <!-- ========== TANKER DECK (long flat with central manifold piping) ========== -->
  <g filter="url(#rigShadow)">
    <!-- Raised deck strip -->
    <rect x="160" y="380" width="730" height="14" fill="url(#hullDeck)"/>
    <rect x="160" y="380" width="730" height="3" fill="#FFFFFF" opacity="0.35"/>

    <!-- Central catwalk running fore-to-aft (signature of tanker) -->
    <rect x="180" y="365" width="700" height="18" rx="2" fill="#3A4258"/>
    <rect x="180" y="365" width="700" height="3" fill="#FFFFFF" opacity="0.4"/>
    <!-- Catwalk railing posts -->
    <g stroke="#7A7F88" stroke-width="1.5" opacity="0.7">
      <line x1="200" y1="358" x2="200" y2="365"/>
      <line x1="280" y1="358" x2="280" y2="365"/>
      <line x1="360" y1="358" x2="360" y2="365"/>
      <line x1="440" y1="358" x2="440" y2="365"/>
      <line x1="520" y1="358" x2="520" y2="365"/>
      <line x1="600" y1="358" x2="600" y2="365"/>
      <line x1="680" y1="358" x2="680" y2="365"/>
      <line x1="760" y1="358" x2="760" y2="365"/>
      <line x1="840" y1="358" x2="840" y2="365"/>
      <!-- Top railing -->
      <line x1="200" y1="358" x2="840" y2="358"/>
    </g>

    <!-- Cargo tank manhole/access points along centerline (visible as dome shapes) -->
    <g>
      <ellipse cx="240" cy="378" rx="14" ry="5" fill="#3A3F4A"/>
      <ellipse cx="240" cy="375" rx="11" ry="3" fill="#5A606D"/>
    </g>
    <g>
      <ellipse cx="360" cy="378" rx="14" ry="5" fill="#3A3F4A"/>
      <ellipse cx="360" cy="375" rx="11" ry="3" fill="#5A606D"/>
    </g>
    <g>
      <ellipse cx="480" cy="378" rx="14" ry="5" fill="#3A3F4A"/>
      <ellipse cx="480" cy="375" rx="11" ry="3" fill="#5A606D"/>
    </g>
    <g>
      <ellipse cx="600" cy="378" rx="14" ry="5" fill="#3A3F4A"/>
      <ellipse cx="600" cy="375" rx="11" ry="3" fill="#5A606D"/>
    </g>
    <g>
      <ellipse cx="720" cy="378" rx="14" ry="5" fill="#3A3F4A"/>
      <ellipse cx="720" cy="375" rx="11" ry="3" fill="#5A606D"/>
    </g>
    <g>
      <ellipse cx="840" cy="378" rx="14" ry="5" fill="#3A3F4A"/>
      <ellipse cx="840" cy="375" rx="11" ry="3" fill="#5A606D"/>
    </g>

    <!-- MIDSHIPS MANIFOLD (the prominent piping array at center — signature tanker feature) -->
    <g>
      <!-- Manifold platform -->
      <rect x="450" y="295" width="160" height="70" rx="3" fill="#3A4258"/>
      <rect x="450" y="295" width="160" height="4" fill="#FFFFFF" opacity="0.4"/>
      <!-- Manifold piping (vertical valve stacks) -->
      <g fill="#5A606D">
        <rect x="465" y="280" width="16" height="80" rx="2"/>
        <rect x="495" y="280" width="16" height="80" rx="2"/>
        <rect x="525" y="280" width="16" height="80" rx="2"/>
        <rect x="555" y="280" width="16" height="80" rx="2"/>
        <rect x="585" y="280" width="16" height="80" rx="2"/>
      </g>
      <!-- Valve handles atop each pipe -->
      <g fill="#FF6B35">
        <circle cx="473" cy="278" r="6"/><circle cx="503" cy="278" r="6"/><circle cx="533" cy="278" r="6"/><circle cx="563" cy="278" r="6"/><circle cx="593" cy="278" r="6"/>
      </g>
      <!-- Manifold connection flanges (the side outlets where shore hoses connect) -->
      <g fill="#1A1F2E">
        <rect x="445" y="320" width="6" height="14"/>
        <rect x="609" y="320" width="6" height="14"/>
      </g>
    </g>

    <!-- Forward mast/derrick -->
    <line x1="220" y1="380" x2="220" y2="240" stroke="#1A1F2E" stroke-width="3" stroke-linecap="round"/>
    <line x1="220" y1="280" x2="270" y2="290" stroke="#3A4258" stroke-width="2" stroke-linecap="round"/>

    <!-- Hazmat warning placard on deck (Class 3 flammable for petroleum) -->
    <g transform="translate(380 320) rotate(45)">
      <rect x="-22" y="-22" width="44" height="44" fill="#E5350D" stroke="#FFFFFF" stroke-width="2"/>
      <g transform="rotate(-45)"><text y="2" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="16" fill="#FFFFFF">3</text></g>
    </g>
  </g>

  
    </g>
  </g>
  <!-- BRIDGE — aft -->
  <g filter="url(#rigShadow)">
    <rect x="900" y="240" width="120" height="150" rx="3" fill="url(#bridge)"/>
    <rect x="900" y="240" width="120" height="3" fill="#FFFFFF" opacity="0.6"/>
