      <rect x="908" y="312" width="104" height="14" rx="1.5"/><rect x="908" y="332" width="104" height="14" rx="1.5"/><rect x="908" y="352" width="104" height="14" rx="1.5"/>
    </g>
    <g stroke="#5A6378" stroke-width="0.6" opacity="0.65"><line x1="940" y1="252" x2="940" y2="366"/><line x1="980" y1="252" x2="980" y2="366"/></g>
    <rect x="950" y="195" width="32" height="50" rx="3" fill="#1A1F2E"/>
    <rect x="950" y="195" width="32" height="6" rx="3" fill="#3A3F4A"/>
    <rect x="950" y="213" width="32" height="6" fill="#0AC2C2" opacity="0.85"/>
    <line x1="996" y1="240" x2="996" y2="180" stroke="#1A1F2E" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="996" cy="180" r="3.5" fill="#FFE680"/>
  </g>

  <line x1="113" y1="396" x2="100" y2="468" stroke="#0AC2C2" stroke-width="2" opacity="0.7"/>
  
  <g opacity="0.75">
  </g>
  <!-- ========== WAKE TRAIL (aft, drifts right) ========== -->
  <g filter="url(#foamBlur)">
    <ellipse class="wake-1" cx="1108" cy="488" rx="14" ry="4" fill="url(#foam)"/>
    <ellipse class="wake-2" cx="1108" cy="494" rx="12" ry="3" fill="url(#foam)"/>
    <ellipse class="wake-3" cx="1108" cy="482" rx="10" ry="3" fill="url(#foam)"/>
    <ellipse class="wake-4" cx="1108" cy="498" rx="13" ry="3" fill="url(#foam)"/>
  </g>

  <!-- ========== BOW WAVE (cutwater foam) ========== -->
  <g filter="url(#foamBlur)">
    <ellipse class="bow-wave-1" cx="100" cy="475" rx="22" ry="6" fill="url(#foam)"/>
    <ellipse class="bow-wave-2" cx="100" cy="482" rx="18" ry="5" fill="url(#foam)"/>
    <ellipse class="bow-wave-3" cx="100" cy="488" rx="16" ry="4" fill="url(#foam)"/>
  </g>

  <!-- ========== BOW SPRAY MIST ========== -->
  <g filter="url(#foamBlur)" opacity="0.6">
    <circle class="bow-spray" cx="115" cy="455" r="5" fill="#FFFFFF"/>
    <circle class="bow-spray" cx="118" cy="450" r="4" fill="#FFFFFF" style="animation-delay:-0.5s"/>
    <circle class="bow-spray" cx="112" cy="458" r="3" fill="#FFFFFF" style="animation-delay:-1s"/>
  </g>

  <!-- ========== EUSOTRIP BRAND LOCKUP ========== -->
  
  
